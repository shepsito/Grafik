name: Build Android APK

on:
push:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  - name: Install System Dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        git \
        zip \
        unzip \
        python3-pip \
        autoconf \
        libtool \
        pkg-config \
        zlib1g-dev \
        libncurses5-dev \
        libgdbm-dev \
        libnss3-dev \
        libssl-dev \
        libreadline-dev \
        libffi-dev \
        libsqlite3-dev \
        tk-dev \
        libgdbm-compat-dev \
        libreoffice-dev \
        libmpdec-dev \
        bluez \
        libbluetooth-dev \
        libxml2-dev \
        libxslt1-dev \
        libopenjp2-7-dev \
        libjpeg-dev \
        libfreetype6-dev \
        libharfbuzz0b \
        libwebp7 \
        libtiff-dev \
        build-essential

  - name: Install Buildozer and Cython
    run: |
      python3 -m pip install --user --upgrade pip
      python3 -m pip install --user Cython==3.0.11
      python3 -m pip install --user --upgrade git+https://github.com/kivy/buildozer.git

  - name: Add user local bin to PATH
    run: |
      echo "$HOME/.local/bin" >> $GITHUB_PATH

  - name: Verify Buildozer
    run: |
      which buildozer
      buildozer --version

  - name: Create buildozer.spec
    run: |
      cat > buildozer.spec << 'EOF'
      [app]

      title = GrafikProverki
      package.name = grafikapp
      package.domain = org.twoman

      source.dir = .
      source.include_exts = py,png,jpg,kv,atlas

      version = 1.0

      requirements = python3,kivy,pillow,pyjnius

      orientation = portrait
      fullscreen = 1

      android.archs = arm64-v8a
      android.api = 33
      android.minapi = 24
      android.sdk = 33

      android.permissions = POST_NOTIFICATIONS,VIBRATE,WAKE_LOCK,RECEIVE_BOOT_COMPLETED

      services = mynotificationservice:service.py

      android.gradle_dependencies = androidx.appcompat:appcompat:1.6.1

      [buildozer]

      log_level = 2
      EOF

  - name: Build APK with Buildozer
    env:
      APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
    run: |
      buildozer -vvv android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: android-apk
      path: bin/*.apk
      if-no-files-found: warn
```
