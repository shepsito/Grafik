name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libmpdec-dev bluez libbluetooth-dev libxml2-dev libxslt1-dev libopenjp2-7-dev libjpeg-dev libfreetype6-dev libharfbuzz0b libwebp7 libtiff5-dev build-essential

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user "Cython==3.0.11"
          pip3 install --user --upgrade git+https://github.com/kivy/buildozer.git

      - name: Add user local bin to PATH
        run: echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Install Android SDK and NDK
        run: |
          # Изтегляне на Android command line tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk
          mv cmdline-tools $HOME/android-sdk/
          # Създаване на правилната структура за cmdline-tools
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv $HOME/android-sdk/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          # Приемане на лицензи
          yes | sdkmanager --licenses
          # Инсталиране на необходимите компоненти
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"
          # Създаване на symlink за NDK в очаквания от Buildozer формат
          mkdir -p $ANDROID_SDK_ROOT
          ln -sfn $ANDROID_SDK_ROOT/ndk/25.2.9519653 $ANDROID_SDK_ROOT/android-ndk-r25.2.9519653
          ln -sfn $ANDROID_SDK_ROOT/ndk/25.2.9519653 $ANDROID_SDK_ROOT/ndk-bundle
          # Проверка на инсталацията
          echo "=== Android SDK contents ==="
          ls -la $ANDROID_SDK_ROOT
          echo "=== NDK contents ==="
          ls -la $ANDROID_SDK_ROOT/ndk/25.2.9519653 || true
          echo "=== android-ndk symlink ==="
          ls -la $ANDROID_SDK_ROOT/android-ndk-r25.2.9519653 || true

      - name: Setup environment variables
        run: |
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-sdk/android-ndk-r25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-sdk/android-ndk-r25.2.9519653" >> $GITHUB_ENV
          echo "BUILDOZER_ANDROID_SDK_PATH=$HOME/android-sdk" >> $GITHUB_ENV
          echo "BUILDOZER_ANDROID_NDK_PATH=$HOME/android-sdk/android-ndk-r25.2.9519653" >> $GITHUB_ENV
          echo "PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV
          echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Debug environment
        run: |
          echo "=== Environment variables ==="
          env | grep -E 'ANDROID_|BUILDOZER_|PATH'
          echo "=== NDK_HOME check ==="
          ls -la $ANDROID_NDK_HOME || echo "NDK_HOME not found!"
          echo "=== BUILDOZER_NDK_PATH check ==="
          ls -la $BUILDOZER_ANDROID_NDK_PATH || echo "BUILDOZER_NDK_PATH not found!"

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = GrafikProverki
          package.name = grafikapp
          package.domain = org.twoman
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas
          version = 1.0
          requirements = python3, kivy, pillow, pyjnius
          orientation = portrait
          fullscreen = 1
          android.archs = arm64-v8a
          android.api = 33
          android.minapi = 24
          android.ndk = 25.2.9519653
          android.sdk = 33
          android.permissions = POST_NOTIFICATIONS, VIBRATE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED
          services = mynotificationservice:service.py
          android.gradle_dependencies = androidx.appcompat:appcompat:1.6.1

          [buildozer]
          log_level = 2
          EOF

      - name: Build APK with Buildozer
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
        run: |
          # Изрично задаваме пътищата за buildozer
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_HOME=$HOME/android-sdk/android-ndk-r25.2.9519653
          export BUILDOZER_ANDROID_SDK_PATH=$HOME/android-sdk
          export BUILDOZER_ANDROID_NDK_PATH=$HOME/android-sdk/android-ndk-r25.2.9519653
          
          echo "Using NDK at: $BUILDOZER_ANDROID_NDK_PATH"
          buildozer -vvv android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GrafikProverki-APK
          path: bin/*.apk
