name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libmpdec-dev bluez libbluetooth-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user "Cython==0.29.35" "buildozer==1.5.0"

      - name: Add user local bin to PATH
        run: echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Create buildozer.spec
        run: |
          echo '[app]' > buildozer.spec
          echo 'title = GrafikProverki' >> buildozer.spec
          echo 'package.name = grafikapp' >> buildozer.spec
          echo 'package.domain = org.twoman' >> buildozer.spec
          echo 'source.dir = .' >> buildozer.spec
          echo 'source.include_exts = py,png,jpg,kv,atlas' >> buildozer.spec
          echo 'version = 1.0' >> buildozer.spec
          
          # Requirements
          echo 'requirements = python3==3.11.0, hostpython3==3.11.0, kivy==2.3.0, pillow==10.2.0, pyjnius' >> buildozer.spec
          
          echo 'orientation = portrait' >> buildozer.spec
          echo 'fullscreen = 1' >> buildozer.spec
          echo 'android.archs = arm64-v8a' >> buildozer.spec
          echo 'android.api = 33' >> buildozer.spec
          echo 'android.minapi = 24' >> buildozer.spec
          echo 'android.permissions = POST_NOTIFICATIONS, VIBRATE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED' >> buildozer.spec
          echo 'services = mynotificationservice:service.py' >> buildozer.spec
          
          # Свързваме твърдо NDK версията
          echo 'android.ndk = 25.2.9519653' >> buildozer.spec
          echo '[buildozer]' >> buildozer.spec
          echo 'log_level = 2' >> buildozer.spec

      # Използваме -v4 за кеша, за да изчистим напълно всички стари неуспешни опити
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-v4

      # ИНСТАЛИРАНЕ НА SDK & NDK + ЖЕЛЕЗЕН FALLBACK ПРИ Срив НА SDKMANAGER
      - name: Install Android SDK & NDK (API 33, NDK r25)
        run: |
          set -euo pipefail
          export ANDROID_SDK_ROOT="$HOME/Android/Sdk"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -sS -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/extracted_tools
          
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          cp -r /tmp/extracted_tools/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          rm -rf /tmp/extracted_tools /tmp/cmdline-tools.zip

          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          # Приемане на лицензи без чупене от SIGPIPE
          set +o pipefail
          yes | $SDKMANAGER --sdk_root="$ANDROID_SDK_ROOT" --licenses
          set -o pipefail

          # Опит за инсталация с verbose логване
          echo "Стартирам инсталация през sdkmanager..."
          $SDKMANAGER --sdk_root="$ANDROID_SDK_ROOT" --verbose "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653" || echo "Предупреждение: някои компоненти от sdkmanager не се инсталираха."

          # ПРОВЕРКА И КРИТИЧЕН РЪЧЕН FALLBACK ЗА NDK
          NDK_DIR="$ANDROID_SDK_ROOT/ndk/25.2.9519653"
          if [ ! -d "$NDK_DIR" ]; then
            echo "🚨 Срив в sdkmanager! NDK не беше намерено на адрес: $NDK_DIR"
            echo "🚀 Стартирам АЛТЕРНАТИВЕН РЪЧЕН ДИРЕКТЕН ДАУНЛОУД НА NDK r25b..."
            
            curl -L -o /tmp/android-ndk.zip https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
            mkdir -p /tmp/ndk_extracted
            unzip -q /tmp/android-ndk.zip -d /tmp/ndk_extracted
            
            mkdir -p "$ANDROID_SDK_ROOT/ndk/25.2.9519653"
            # Преместване на съдържанието от разархивираната папка (android-ndk-r25b) в правилната структура
            cp -r /tmp/ndk_extracted/android-ndk-r25b/* "$ANDROID_SDK_ROOT/ndk/25.2.9519653/"
            rm -rf /tmp/ndk_extracted /tmp/android-ndk.zip
          fi

          # Финална проверка дали всичко е на мястото си
          if [ ! -d "$ANDROID_SDK_ROOT/ndk/25.2.9519653" ]; then
            echo "🚨 ГРЕШКА: NDK липсва дори и след ръчния даунлоуд!"
            exit 1
          else
            echo "✅ УСПЕХ: NDK е инсталирано и потвърдено в: $ANDROID_SDK_ROOT/ndk/25.2.9519653"
          fi

          # Персистиране на променливите
          echo "ANDROIDNDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
        shell: bash

      # ВЕРИФИКАЦИЯ ПРЕДИ СТАРТ
      - name: Verify SDK Before Build
        run: |
          set -euo pipefail
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          
          echo "=== Проверка на папка platforms ==="
          ls -la "$ANDROID_SDK_ROOT/platforms" || true
          
          echo "=== Проверка на папка NDK ==="
          ls -la "$ANDROID_SDK_ROOT/ndk/25.2.9519653" | head -n 10 || true
        shell: bash

      # СТАБИЛНО КОМПИЛИРАНЕ С ПОДРОБЕН ЛОГ (buildozer -v)
      - name: Build APK with Buildozer
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          CFLAGS: "-Wno-incompatible-function-pointer-types"
          ANDROIDSDK: "/home/runner/Android/Sdk"
          ANDROID_SDK_ROOT: "/home/runner/Android/Sdk"
          ANDROID_HOME: "/home/runner/Android/Sdk"
          ANDROIDNDK: "/home/runner/Android/Sdk/ndk/25.2.9519653"
          ANDROID_NDK_HOME: "/home/runner/Android/Sdk/ndk/25.2.9519653"
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "24"
        run: |
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          
          # Стартиране на подробна компилация
          buildozer -v android debug
          
          # Защита против празни бин директории
          if [ -z "$(ls -A bin/*.apk 2>/dev/null)" ]; then
            echo "🚨 КРИТИЧНА ГРЕШКА: Няма генериран APK файл в папка bin/!"
            exit 1
          else
            echo "✅ УСПЕХ: APK файлът беше генериран успешно!"
          fi
        shell: bash
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
