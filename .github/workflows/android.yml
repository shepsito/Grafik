name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libmpdec-dev bluez libbluetooth-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user "buildozer==1.5.0" "cython==0.29.36"

      - name: Create buildozer.spec
        run: |
          echo '[app]' > buildozer.spec
          echo 'title = GrafikProverki' >> buildozer.spec
          echo 'package.name = grafikapp' >> buildozer.spec
          echo 'package.domain = org.twoman' >> buildozer.spec
          echo 'source.dir = .' >> buildozer.spec
          echo 'source.include_exts = py,png,jpg,kv,atlas' >> buildozer.spec
          echo 'version = 1.0' >> buildozer.spec
          # Използваме стабилни и проверени версии за Android
          echo 'requirements = python3, kivy==2.3.0, kivymd==1.1.1, pillow' >> buildozer.spec
          echo 'orientation = portrait' >> buildozer.spec
          echo 'fullscreen = 1' >> buildozer.spec
          echo 'android.archs = arm64-v8a' >> buildozer.spec
          # Вдигаме версиите според изискванията на новия Samsung
          echo 'android.api = 34' >> buildozer.spec
          echo 'android.minapi = 26' >> buildozer.spec
          echo 'android.permissions = VIBRATE' >> buildozer.spec
          echo '[buildozer]' >> buildozer.spec
          echo 'log_level = 2' >> buildozer.spec
          echo 'warn_on_root = 1' >> buildozer.spec

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
