name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libmpdec-dev bluez libbluetooth-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user "Cython==0.29.35" "buildozer==1.5.0"

      - name: Add user local bin to PATH
        run: echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Create buildozer.spec
        run: |
          echo '[app]' > buildozer.spec
          echo 'title = GrafikProverki' >> buildozer.spec
          echo 'package.name = grafikapp' >> buildozer.spec
          echo 'package.domain = org.twoman' >> buildozer.spec
          echo 'source.dir = .' >> buildozer.spec
          echo 'source.include_exts = py,png,jpg,kv,atlas' >> buildozer.spec
          echo 'version = 1.0' >> buildozer.spec
          
          # Requirements: pyjnius за Java комуникацията
          echo 'requirements = python3==3.11.0, hostpython3==3.11.0, kivy==2.3.0, pillow==10.2.0, pyjnius' >> buildozer.spec
          
          echo 'orientation = portrait' >> buildozer.spec
          echo 'fullscreen = 1' >> buildozer.spec
          echo 'android.archs = arm64-v8a' >> buildozer.spec
          echo 'android.api = 33' >> buildozer.spec
          echo 'android.minapi = 24' >> buildozer.spec
          
          # Разрешения: Нужни за известия, будилник, вибрация и стартиране при boot
          echo 'android.permissions = POST_NOTIFICATIONS, VIBRATE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED' >> buildozer.spec
          
          # Само малки букви за името на услугата
          echo 'services = mynotificationservice:service.py' >> buildozer.spec
          
          # КОРИГИРАНО: Точно съвпадение на NDK версията с инсталираната по-долу
          echo 'android.ndk = 25.2.9519653' >> buildozer.spec
          echo '[buildozer]' >> buildozer.spec
          echo 'log_level = 2' >> buildozer.spec

      # Кеширане на Buildozer directory - Използваме -v2 за чисто начало
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-v2

      # 1. КОРИГИРАНО И СИНХРОНИЗИРАНО ИНСТАЛИРАНЕ НА SDK & NDK
      - name: Install Android SDK & NDK (API 33, NDK r25)
        run: |
          set -euo pipefail

          # Задаване и персистиране на SDK корена за всички следващи стъпки
          export ANDROID_SDK_ROOT="$HOME/Android/Sdk"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          # Сваляне на Android command line tools
          curl -sS -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/extracted_tools
          
          # Сигурно и чисто преместване в canonical структурата 'latest' без счупен синтаксис
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          cp -r /tmp/extracted_tools/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          rm -rf /tmp/extracted_tools /tmp/cmdline-tools.zip

          # Персистиране на PATH в GITHUB_ENV
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"

          # Приемане на лицензи (с улавяне на грешки)
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || (echo "Грешка при приемане на лицензите" && exit 1)

          # Инсталиране на пакетите с проверка за провал
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653" || (echo "sdkmanager инсталацията пропадна!" && exit 1)
        shell: bash

      # 2. ВЕРИФИКАЦИЯ ПРЕДИ СТАРТ
      - name: Verify SDK Before Build
        run: |
          set -euo pipefail
          echo "Проверка на състоянието на: $ANDROID_SDK_ROOT"
          
          echo "=== Налични платформи в директорията ==="
          ls -la "$ANDROID_SDK_ROOT/platforms" || true
          
          echo "=== Списък с инсталирани компоненти ==="
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --list_installed || true
          
          if [ ! -d "$ANDROID_SDK_ROOT/platforms/android-33" ]; then
            echo "🚨 КРИТИЧНО: Android API 33 липсва в папка platforms! Опит за принудително доинсталиране..."
            sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platforms;android-33" || (echo "Инсталацията на API 33 се провали!" && exit 1)
          else
            echo "✅ Android API 33 е наличен и валидиран!"
          fi
        shell: bash

      # 3. СТАБИЛНО КОМПИЛИРАНЕ
      - name: Build APK with Buildozer
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          CFLAGS: "-Wno-incompatible-function-pointer-types"
          # Пълно съответствие на пътищата за Gradle, p4a и Buildozer
          ANDROIDSDK: "/home/runner/Android/Sdk"
          ANDROID_SDK_ROOT: "/home/runner/Android/Sdk"
          ANDROID_HOME: "/home/runner/Android/Sdk"
          ANDROIDNDK: "/home/runner/Android/Sdk/ndk/25.2.9519653"
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "24"
        run: |
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          buildozer android debug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
