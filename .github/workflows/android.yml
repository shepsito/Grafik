name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libmpdec-dev bluez libbluetooth-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user "Cython==0.29.35" "buildozer==1.5.0"

      - name: Add user local bin to PATH
        run: echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Create buildozer.spec
        run: |
          echo '[app]' > buildozer.spec
          echo 'title = GrafikProverki' >> buildozer.spec
          echo 'package.name = grafikapp' >> buildozer.spec
          echo 'package.domain = org.twoman' >> buildozer.spec
          echo 'source.dir = .' >> buildozer.spec
          echo 'source.include_exts = py,png,jpg,kv,atlas' >> buildozer.spec
          echo 'version = 1.0' >> buildozer.spec
          
          # Requirements
          echo 'requirements = python3==3.11.0, hostpython3==3.11.0, kivy==2.3.0, pillow==10.2.0, pyjnius' >> buildozer.spec
          
          echo 'orientation = portrait' >> buildozer.spec
          echo 'fullscreen = 1' >> buildozer.spec
          echo 'android.archs = arm64-v8a' >> buildozer.spec
          echo 'android.api = 33' >> buildozer.spec
          echo 'android.minapi = 24' >> buildozer.spec
          echo 'android.permissions = POST_NOTIFICATIONS, VIBRATE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED' >> buildozer.spec
          echo 'services = mynotificationservice:service.py' >> buildozer.spec
          
          # Синхронизирана NDK версия
          echo 'android.ndk = 25.2.9519653' >> buildozer.spec
          echo '[buildozer]' >> buildozer.spec
          echo 'log_level = 2' >> buildozer.spec

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-v5

      # ИНСТАЛИРАНЕ НА SDK И НАПЪЛНО КОРЕКТИРАН FALLBACK СЪС ЗАДЪЛЖИТЕЛНИТЕ СИНТАКТИЧНИ ЗАГРАЖДЕНИЯ
      - name: Install Android SDK & NDK (API 33, NDK r25)
        run: |
          set -euo pipefail
          export ANDROID_SDK_ROOT="$HOME/Android/Sdk"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -sS -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/extracted_tools
          
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          cp -r /tmp/extracted_tools/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          rm -rf /tmp/extracted_tools /tmp/cmdline-tools.zip

          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          # Приемане на лицензи без чупене от SIGPIPE
          set +o pipefail
          yes | $SDKMANAGER --sdk_root="$ANDROID_SDK_ROOT" --licenses
          set -o pipefail

          # ФИКСИРАНО: Премахнато е отрязването с [...], кавичките са затворени коректно
          echo "Стартирам инсталация през sdkmanager..."
          $SDKMANAGER --sdk_root="$ANDROID_SDK_ROOT" --verbose "platform-tools" "platforms;android-33" "build-tools;33.0.2" || echo "Warning: Issue with base components, continuing with NDK fallback..."

          # ПРОВЕРКА И КРИТИЧЕН РЪЧЕН FALLBACK ЗА NDK С RETRY
          NDK_DIR="$ANDROID_SDK_ROOT/ndk/25.2.9519653"
          if [ ! -d "$NDK_DIR" ]; then
            echo "🚨 Срив в sdkmanager или липсващо NDK! Стартирам алтернативен защитен даунлоуд..."
            
            MAX_RETRIES=3
            RETRY_COUNT=0
            NDK_URL="https://dl.google.com/android/repository/android-ndk-r25.2.9519653-linux-x86_64.zip"
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -L --fail --retry 3 --retry-delay 2 -o /tmp/android-ndk.zip "$NDK_URL"; then
                # Валидация на ZIP архива преди разархивиране
                if unzip -t /tmp/android-ndk.zip > /dev/null 2>&1; then
                  echo "✅ NDK архивът е свален и верифициран успешно!"
                  break
                else
                  echo "⚠️ Сваленият ZIP файл е повреден/непълен, опитвам отново..."
                  rm -f /tmp/android-ndk.zip
                  RETRY_COUNT=$((RETRY_COUNT + 1))
                fi
              else
                echo "⚠️ Даунлоудът пропадна, следва нов опит..."
                RETRY_COUNT=$((RETRY_COUNT + 1))
              fi
            done
            
            if [ ! -f /tmp/android-ndk.zip ]; then
              echo "❌ Неуспешен даунлоуд на NDK след $MAX_RETRIES опита."
              exit 1
            fi
            
            mkdir -p /tmp/ndk_extracted
            unzip -q /tmp/android-ndk.zip -d /tmp/ndk_extracted
            
            NDK_FOLDER=$(ls -d /tmp/ndk_extracted/android-ndk* | head -1)
            mkdir -p "$ANDROID_SDK_ROOT/ndk"
            mv "$NDK_FOLDER" "$NDK_DIR"
            rm -f /tmp/android-ndk.zip
            echo "✅ NDK инсталиран успешно от резервния даунлоуд!"
          fi

          # Експортиране на променливите на средата
          echo "Setting NDK environment variables..."
          echo "ANDROIDNDK=$NDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "✅ Android SDK & NDK installation complete!"
        shell: bash

      # ВЕРИФИКАЦИЯ ПРЕДИ СТАРТ
      - name: Verify SDK Before Build
        run: |
          set -euo pipefail
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          echo "=== Налични платформи ==="
          ls -la "$ANDROID_SDK_ROOT/platforms" || true
          echo "=== Структура на NDK ==="
          ls -la "$ANDROID_SDK_ROOT/ndk/25.2.9519653" | head -n 5 || true
        shell: bash

      # СТАБИЛНО КОМПИЛИРАНЕ С ПОДРОБЕН ЛОГ
      - name: Build APK with Buildozer
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          CFLAGS: "-Wno-incompatible-function-pointer-types"
          ANDROIDSDK: "/home/runner/Android/Sdk"
          ANDROID_SDK_ROOT: "/home/runner/Android/Sdk"
          ANDROID_HOME: "/home/runner/Android/Sdk"
          ANDROIDNDK: "/home/runner/Android/Sdk/ndk/25.2.9519653"
          ANDROID_NDK_HOME: "/home/runner/Android/Sdk/ndk/25.2.9519653"
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "24"
        run: |
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          
          buildozer -v android debug
          
          if [ -z "$(ls -A bin/*.apk 2>/dev/null)" ]; then
            echo "🚨 КРИТИЧНА ГРЕШКА: Папка bin/ е празна. Buildozer не генерира APK!"
            exit 1
          else
            echo "✅ УСПЕХ: APK файлът беше намерен!"
          fi
        shell: bash
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
